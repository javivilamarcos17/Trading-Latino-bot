# Recolector de la ARENA en la NUBE — patrón BUCLE-EN-JOB (robusto al cron errático de GitHub).
# Un disparo lanza un job que recoge cada 15 min durante ~6 horas seguidas. Se relanza cada 6h.
# Así NO dependemos de que GitHub dispare cada 15 min (que no lo hace de forma fiable).
# Datos -> rama "arena-data", carpeta data_store/paper_arena.
#
# Para arrancar YA (sin esperar al cron): pestaña Actions -> Arena Paper Collector -> Run workflow.

name: Arena Paper Collector

on:
  schedule:
    - cron: "0 */6 * * *"     # cada 6h (best-effort; con que dispare 1 vez tenemos 6h de recogida)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: arena-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 355        # tope ~5.9h (máximo de GitHub es 6h)
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install ccxt pandas numpy requests

      - name: Recuperar datos previos (rama arena-data)
        run: |
          git fetch origin arena-data || true
          git checkout origin/arena-data -- data_store/paper_arena 2>/dev/null || echo "primera vez, sin datos previos"

      - name: BUCLE de recogida (~5.5h, una pasada cada 15 min)
        run: |
          git config user.name "arena-bot"
          git config user.email "actions@users.noreply.github.com"
          git checkout -B arena-data
          fin=$(( $(date +%s) + 19800 ))     # ~5.5 horas (margen para el auto-encadenado)
          n=0
          while [ "$(date +%s)" -lt "$fin" ]; do
            n=$((n+1))
            echo "===== pasada $n  $(date -u +%FT%TZ) ====="
            python -m trading_latino.live.arena || echo "fallo en una pasada, sigo"
            git add -f data_store/paper_arena
            git commit -m "arena: datos $(date -u +%FT%TZ) [skip ci]" || echo "sin cambios"
            git push origin arena-data --force || echo "push falló, reintento la próxima"
            sleep 900
          done

      - name: Auto-encadenar (lanzar la siguiente ejecución automáticamente)
        if: always()
        env:
          PAT: ${{ secrets.ARENA_PAT }}
        run: |
          if [ -n "$PAT" ]; then
            curl -s -X POST \
              -H "Authorization: Bearer $PAT" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/arena.yml/dispatches" \
              -d '{"ref":"master"}' && echo "Siguiente ejecución lanzada -> recogida 24/7 perpetua."
          else
            echo "Sin secreto ARENA_PAT: no hay auto-encadenado (configúralo para 24/7 sin clics)."
          fi
