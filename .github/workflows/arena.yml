# Recolector de la ARENA en la NUBE (GitHub Actions) — corre 24/7 sin depender del portátil.
# Cada 15 min: ejecuta la arena (paper-trading) y guarda los datos en la rama "arena-data".
# Para verlos: en GitHub, cambia a la rama "arena-data" -> carpeta data_store/paper_arena.
#
# NOTA de coste: si el repo es PÚBLICO, los minutos de Actions son gratis. Si es PRIVADO, hay
# 2000 min/mes gratis -> cada 15 min se pasa; en ese caso cambia el cron a '0 * * * *' (cada hora)
# o haz el repo público.

name: Arena Paper Collector

on:
  schedule:
    - cron: "*/15 * * * *"     # cada 15 minutos (best-effort; GitHub puede retrasarlo algo)
  workflow_dispatch: {}         # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write

concurrency:
  group: arena-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install ccxt pandas numpy requests

      - name: Recuperar datos previos (rama arena-data)
        run: |
          git fetch origin arena-data || true
          git checkout origin/arena-data -- data_store/paper_arena 2>/dev/null || echo "primera ejecución, sin datos previos"

      - name: Ejecutar la arena (paper-trading)
        run: python -m trading_latino.live.arena

      - name: Guardar datos en la rama arena-data
        run: |
          git config user.name "arena-bot"
          git config user.email "actions@users.noreply.github.com"
          git checkout -B arena-data
          git add -f data_store/paper_arena
          git commit -m "arena: datos $(date -u +%FT%TZ) [skip ci]" || { echo "sin cambios"; exit 0; }
          git push origin arena-data --force
